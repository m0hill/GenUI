name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: nubjs/setup-nub@v0
        with:
          nub-version: ^0.4.5
          node-version: 24
          cache-dependency-path: nub.lock

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('nub.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - run: nub ci
      - run: nub exec --filter genui playwright install --with-deps chromium
      - run: nub run check
